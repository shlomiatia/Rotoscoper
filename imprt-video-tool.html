<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprt Video Tool</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 720px; margin: 0 auto; padding: 20px; background-color: #f2f2f2; }
        .container { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background-color: #6c757d; color: #fff; border: none; padding: 8px 14px; border-radius: 4px; text-decoration: none; }
        .back-btn:hover { background-color: #5a6268; }
        label { display: block; margin: 12px 0 4px; font-weight: 600; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { margin-top: 14px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .status { margin-top: 16px; padding: 12px; border-radius: 5px; background: #f8f9fa; }
        .status.error { background: #ffe3e3; border: 1px solid #f5c6cb; }
        .status.success { background: #d4edda; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Imprt Video</h1>
            <a class="back-btn" href="index.html">← Back</a>
        </div>

        <form id="imprt-video-form">
            <label for="video-file">Video File</label>
            <input id="video-file" type="file" accept="video/*" required>

            <label for="fps">Frame rate (FPS)</label>
            <input id="fps" type="number" min="1" value="24" required>

            <label for="animation-name">Animation Name</label>
            <input id="animation-name" type="text" maxlength="100" placeholder="e.g. Run" required>

            <button id="import-btn" type="submit">Import Video</button>
        </form>

        <div id="status" class="status" style="display:none;"></div>
    </div>

    <script>
        const form = document.getElementById('imprt-video-form');
        const statusEl = document.getElementById('status');

        function showStatus(message, type='info') {
            statusEl.style.display = 'block';
            statusEl.textContent = message;
            statusEl.className = 'status';
            if (type === 'error') statusEl.classList.add('error');
            if (type === 'success') statusEl.classList.add('success');
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const fileInput = document.getElementById('video-file');
            const fpsInput = document.getElementById('fps');
            const nameInput = document.getElementById('animation-name');

            if (!fileInput.files.length) {
                showStatus('Please select a video file.', 'error');
                return;
            }

            const animationName = nameInput.value.trim();
            if (!animationName) {
                showStatus('Animation name is required.', 'error');
                return;
            }

            const fps = Number(fpsInput.value) || 24;
            if (fps <= 0) {
                showStatus('Please enter a valid FPS greater than 0.', 'error');
                return;
            }

            const videoFile = fileInput.files[0];
            const formData = new FormData();
            formData.append('video', videoFile);
            formData.append('fps', fps);
            formData.append('animationName', animationName);

            showStatus('Uploading video and extracting frames...');
            try {
                const response = await fetch('/api/animations/import-video', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (!response.ok || !data.success) {
                    showStatus(data.error || 'Import failed', 'error');
                } else {
                    showStatus(`Imported animation "${data.name}" with ${data.frameCount} frames.`, 'success');
                }
            } catch (err) {
                showStatus('Network error: ' + err.message, 'error');
            }
        });
    </script>
</body>
</html>
